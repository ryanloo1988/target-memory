<script>
(function(){ 
  try {
    window.VERSION = "v2.3.10";
    // Title (replace existing dev markers like v2.x in the <title>)
    if (document && document.title) {
      document.title = document.title.replace(/v\d+\.\d+(?:\.\d+)?(?:-dev)?/i, "v2.3.10");
      if (!/v\d+/.test(document.title)) document.title = document.title + " — v2.3.10";
    }
    // Dev banner text (ensure it shows the same VERSION)
    var dev = document.getElementById('devBanner');
    if (dev) {
      dev.innerHTML = '<strong>Dev build:</strong> v2.3.10 — Keyboard shortcuts, Search, CSV Export. Uses the same <code>reminders.json</code>.';
    }
  } catch(_) { }
})();

function renderChips(){
  chips.innerHTML = '';
  curTags.forEach(function(tag){
    var pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.setAttribute('data-tag', String(tag));
    pill.style.cssText = 'display:inline-flex;align-items:center;gap:.35rem;border:1px solid #d0d0d0;border-radius:999px;padding:.35rem .6rem;';
    var label = document.createElement('span'); label.textContent = '#' + tag;
    var btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'chip-x'; btn.title = 'Remove';
    btn.style.cssText = 'border:none;background:transparent;cursor:pointer;line-height:1;font-size:18px;padding:.25rem .45rem;';
    btn.textContent = '×';
    pill.appendChild(label); pill.appendChild(btn);
    chips.appendChild(pill);
  });

  if (!chips.__chipBound){
    chips.addEventListener('click', function(ev){
      var btn = ev.target.closest && ev.target.closest('.chip-x');
      if (!btn) return;
      ev.preventDefault(); ev.stopPropagation();
      var pill = btn.closest('.tag-pill');
      if (!pill) return;
      var tag = pill.getAttribute('data-tag') || (pill.querySelector('span') && pill.querySelector('span').textContent.replace(/^#\s*/, '').trim());
      var pos = curTags.findIndex(function(t){ return String(t).toLowerCase() === String(tag).toLowerCase(); });
      if (pos > -1){
        curTags.splice(pos, 1);
        renderChips();
      }
    }, false);
    chips.__chipBound = true;
  }
}

</script>

<script>
(function(){
  'use strict';
  function byId(id){ return document.getElementById(id); }
  function esc(s){ return String(s||'').replace(/[&<>\"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;','\'':'&#39;'}[c]); }); }

  /* ========= Multi-select tag-controlled loop ========= */
  var NOT_TAGGED = '__NOT_TAGGED__';
  var activeSet = new Set();

  function loadSelection(){
    try{
      var raw = localStorage.getItem('loopTags') || '[]';
      var arr = JSON.parse(raw);
      if (Array.isArray(arr)) activeSet = new Set(arr.map(x=>String(x)));
    }catch(_){ activeSet = new Set(); }
  }
  function saveSelection(){
    try{ localStorage.setItem('loopTags', JSON.stringify(Array.from(activeSet))); }catch(_){}
  }

  function isAll(){ return activeSet.size === 0; }
  function toggleTag(tag){
    if (tag === ''){
      // All button clears selection
      activeSet.clear();
    } else {
      if (activeSet.has(tag)) activeSet.delete(tag);
      else activeSet.add(tag);
    }
    saveSelection();
    renderTagButtons();
    // restart loop to apply new filter
    try{ if (typeof window.restartLoop==='function') window.restartLoop(); else if (typeof window.startLoop==='function'){ window.stopLoop&&window.stopLoop(); window.startLoop(); } }catch(_){}
  }

  function getAllTags(){
    var list = Array.isArray(window.reminders)? window.reminders : [];
    var st = new Set(); var sawUntagged = false;
    for (var i=0;i<list.length;i++){
      var tags = Array.isArray(list[i] && list[i].tags) ? list[i].tags : [];
      if (!tags.length) sawUntagged = true;
      for (var j=0;j<tags.length;j++){
        var t = String(tags[j]||'').trim(); if (t) st.add(t);
      }
    }
    return { tags: Array.from(st).sort((a,b)=>a.localeCompare(b)), hasUntagged: sawUntagged };
  }

  function renderTagButtons(){
    var bar = byId('tagLoopBar'); if (!bar) return;
    var meta = getAllTags();
    var tags = meta.tags;
    var html = '';
    html += '<button class="tagbtn multi '+(isAll()?'active':'')+'" data-tag="">All</button>';
    html += '<button class="tagbtn multi notag '+(activeSet.has(NOT_TAGGED)?'active':'')+'" data-tag="'+NOT_TAGGED+'">Not Tagged</button>';
    for (var i=0;i<tags.length;i++){
      var t = tags[i];
      var isActive = activeSet.has(String(t).toLowerCase());
      html += '<button class="tagbtn multi '+(isActive?'active':'')+'" data-tag="'+esc(String(t).toLowerCase())+'">#'+esc(t)+'</button>';
    }
    bar.innerHTML = html;
    var btns = bar.querySelectorAll('.tagbtn');
    for (var k=0;k<btns.length;k++){
      btns[k].addEventListener('click', function(){
        var tag = this.getAttribute('data-tag') || '';
        toggleTag(tag);
      });
    }
  }

  function getLoopList(){
    var list = Array.isArray(window.reminders)? window.reminders : [];
    if (isAll()) return list;
    var want = new Set(Array.from(activeSet));
    var wantsUntagged = want.has(NOT_TAGGED);
    return list.filter(function(r){
      var tags = Array.isArray(r && r.tags) ? r.tags : [];
      if (!tags.length) return wantsUntagged;
      // match ANY selected tag (union)
      for (var i=0;i<tags.length;i++){
        if (want.has(String(tags[i]||'').toLowerCase())) return true;
      }
      return false;
    });
  }

  // Patch loop start/stop to use filtered list
  (function(){
    var prevStart = window.startLoop;
    var prevStop  = window.stopLoop;
    window.startLoop = function(){
      try{ if (window.loopTimer) clearInterval(window.loopTimer); }catch(_){}
      function nextIndex(len){
        try{
          var mode = (window.loopMode||'rand').toLowerCase();
          if (mode === 'rand') return Math.floor(Math.random()*len);
          window.loopIdx = (window.loopIdx||0);
          window.loopIdx = (window.loopIdx+1) % len;
          return window.loopIdx;
        }catch(_){ return Math.floor(Math.random()*len); }
      }
      function tick(){
        try{
          var list = getLoopList();
          if (!list.length){ window.setLoopLabel && window.setLoopLabel(''); return; }
          var i = nextIndex(list.length);
          var txt = String(list[i] && list[i].text || '').trim();
          window.setLoopLabel && window.setLoopLabel(txt);
        }catch(e){ try{ console.error('loop tick error', e); }catch(_){ } }
      }
      try{
        var sp = parseInt(window.loopSpeed||2000,10); if (isNaN(sp) || sp<500) sp = 2000;
        window.loopTimer = setInterval(tick, sp);
        tick();
      }catch(_){}
    };
    window.stopLoop = function(){ try{ if (window.loopTimer) clearInterval(window.loopTimer); window.loopTimer=null; }catch(_){ } };
    window.restartLoop = function(){ if (window.loopTimer) window.startLoop(); };
  })();

  // Build tag bar on load and whenever lists render
  document.addEventListener('DOMContentLoaded', function(){

<script>
(function(){
  'use strict';

  function asLower(x){ return String(x||'').trim().toLowerCase(); }
  function esc(s){ return String(s||'').replace(/[&<>\"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;','\'':'&#39;'}[c]); }); }

  function coerceTags(x){
    if (!x) return [];
    if (Array.isArray(x)){
      var out=[]; for (var i=0;i<x.length;i++){ var v = x[i]; if (typeof v==='string'){ v = asLower(v); if (v) out.push(v); } else if (v && typeof v==='object'){ var n=v.name||v.label||v.tag||v.title; if (n){ n=asLower(n); if(n) out.push(n); } } }
      var seen={}, uniq=[]; for (var j=0;j<out.length;j++){ if(!seen[out[j]]){ seen[out[j]]=1; uniq.push(out[j]); } } return uniq;
    }
    if (typeof x==='string'){ return x.split(/[,\|#; ]+/).map(asLower).filter(Boolean); }
    if (typeof x==='object'){ return coerceTags(x.tags||x.labels||x.categories); }
    return [];
  }

  function normalizeItem(it, idx){
    if (typeof it === 'string'){
      return { id: 's-' + idx + '-' + Date.now().toString(36), text: String(it).trim(), tags: [] };
    }
    it = it || {};
    var id = it.id || it.uuid || it.key || it._id || ('n-' + idx + '-' + Date.now().toString(36));
    var text = it.text || it.title || it.name || it.content || it.body || it.value || it.note || it.task || '';
    var tags = coerceTags(it.tags||it.labels||it.categories||it.tag||it.label);
    return { id: String(id), text: String(text).trim(), tags: tags };
  }

  function normalizeArray(arr){
    arr = Array.isArray(arr) ? arr : [];
    var out = []; var seen = {};
    for (var i=0;i<arr.length;i++){
      var n = normalizeItem(arr[i], i);
      if (!n.text && !n.tags.length) continue;
      if (seen[n.id]){ n.id = n.id + '-' + i; } seen[n.id] = 1;
      out.push(n);
    }
    return out;
  }

  window.__normalizeAll = function(){
    try{
      window.reminders = normalizeArray(window.reminders);
      window.deleted   = normalizeArray(window.deleted);
    }catch(_){}
  };

  try{ window.__normalizeAll(); }catch(_){}

  (function(){
    var prev = window.renderLists;
    window.renderLists = function(){
      try{ window.__normalizeAll(); }catch(_){}
      if (typeof prev === 'function') return prev();
    };
  })();

      try{ window.__normalizeAll(); if (typeof window.renderLists==='function') window.renderLists(); }catch(_){}
      return r;
    };
  })();

    if (typeof origC === 'function'){

        var res; try{ res = await origC(); }catch(_){}
        try{ window.__normalizeAll(); if (typeof window.renderLists==='function') window.renderLists(); }catch(_){}
        return res;
      };
    }
  })();
})();
</script>

<script>
(function(){
  'use strict';
  /* ===== FOOLoop v2.3.15: solid auto-link JSON via FS Access + IndexedDB ===== */

  var DB_NAME = 'fooloop-db', STORE = 'kv', KEY = 'dataHandle';
  function idbOpen(){
    return new Promise(function(resolve, reject){
      try{
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function(ev){
          var db = ev.target.result;
          if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
        };
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(e){ reject(e); };
      }catch(e){ reject(e); }
    });
  }
  function idbGet(key){
    return idbOpen().then(function(db){
      return new Promise(function(resolve, reject){
        try{
          var tx = db.transaction(STORE, 'readonly');
          var os = tx.objectStore(STORE);
          var r = os.get(key);
          r.onsuccess = function(){ resolve(r.result); };
          r.onerror = function(e){ reject(e); };
        }catch(e){ reject(e); }
      });
    });
  }
  function idbSet(key, val){
    return idbOpen().then(function(db){
      return new Promise(function(resolve, reject){
        try{
          var tx = db.transaction(STORE, 'readwrite');
          var os = tx.objectStore(STORE);
          var r = os.put(val, key);
          r.onsuccess = function(){ resolve(true); };
          r.onerror = function(e){ reject(e); };
        }catch(e){ reject(e); }
      });
    });
  }
  function idbDel(key){
    return idbOpen().then(function(db){
      return new Promise(function(resolve, reject){
        try{
          var tx = db.transaction(STORE, 'readwrite');
          var os = tx.objectStore(STORE);
          var r = os.delete(key);
          r.onsuccess = function(){ resolve(true); };
          r.onerror = function(e){ reject(e); };
        }catch(e){ reject(e); }
      });
    });
  }

  async function ensureRW(handle){
    if (!handle) return 'denied';
    try{
      var q = await handle.queryPermission({mode:'readwrite'});
      if (q === 'granted') return 'granted';
      var r = await handle.requestPermission({mode:'readwrite'});
      if (r === 'granted') return 'granted';
    }catch(_){}
    return 'denied';
  }
  async function readHandle(h){ const f = await h.getFile(); return await f.text(); }
  async function writeHandle(h, text){ const w = await h.createWritable(); await w.write(text); await w.close(); }

  function setStatus(msg){
    var el = document.getElementById('fileStatus');
    if (el) el.textContent = msg || '';
  }
  function toast(msg){
    try{ (window.toast || function(m){ setStatus(m); setTimeout(()=>setStatus(''), 1800); })(msg); }catch(_){}
  }

  // Expose a "Forget" method for switching files
  window.forgetLinkedJson = async function(){
    await idbDel(KEY);

  // Create a remembered link via showOpenFilePicker

      if (!h) return;

      if (perm !== 'granted'){
        alert('Permission denied. Unable to link file.');
        return;
      }
      // Store handle in IndexedDB
      await idbSet(KEY, h);
      // Make globally visible for existing app code
      try{ window.__dataFileHandle = h; }catch(_){}
      try{ __dataFileHandle = h; }catch(_){}

      // Try reading and applying data
      let text = await readHandle(h);
      let data = {};
      try{ data = JSON.parse(text || '{}'); }catch(e){ data = {}; }
      window.reminders = Array.isArray(data.reminders) ? data.reminders : (window.reminders||[]);
      window.deleted   = Array.isArray(data.deleted)   ? data.deleted   : (window.deleted||[]);

      console.warn('linkJsonInteractive error', e);
      alert('Linking failed: ' + (e && e.message ? e.message : e));
    }
  }

  // Button hookup
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('btnLinkJson');
    if (btn) btn.addEventListener('click', linkJsonInteractive);
  });

  // Auto-reconnect on load
  document.addEventListener('DOMContentLoaded', (async function(){
    try{
      var h = await idbGet(KEY);
      if (!h) { setStatus('No linked JSON. Click “Link JSON (remember)”.'); return; }
      if (await ensureRW(h) !== 'granted'){ setStatus('Re-link needed. Click “Link JSON (remember)”.'); return; }
      try{ window.__dataFileHandle = h; }catch(_){}
      try{ __dataFileHandle = h; }catch(_){}
      // Read and populate
      var text = await readHandle(h);
      var data = {}; try{ data = JSON.parse(text || '{}'); }catch(_){}
      window.reminders = Array.isArray(data.reminders) ? data.reminders : (window.reminders||[]);
      window.deleted   = Array.isArray(data.deleted)   ? data.deleted   : (window.deleted||[]);
      if (typeof window.renderLists === 'function') window.renderLists();
      setStatus('Auto-connected: ' + (h.name || 'reminders.json'));
      toast('Auto-connected previous file.');
    }catch(e){
      console.warn('auto-connect failed', e);
      setStatus('Auto-connect failed. Click “Link JSON (remember)”.');
    }
  }));

  // Last-wins saveReminders always writes to the remembered handle (when available)
  (function(){
    var prev = window.saveReminders;
    window.saveReminders = async function(){
      try{ if (typeof prev === 'function') await prev(); }catch(_){}
      try{
        var payload = JSON.stringify({reminders:(window.reminders||[]), deleted:(window.deleted||[]), schema:1}, null, 2);
        var h = (typeof window.__dataFileHandle!=='undefined' && window.__dataFileHandle) ? window.__dataFileHandle : null;
        if (h && h.createWritable){
          try{
            await writeHandle(h, payload);

          }catch(e){
            console.warn('save to handle failed', e);
            setStatus('Save failed (handle).');
          }
        } else {
          window.__lastJSONPayload = payload; // for Export JSON fallback
        }
      }catch(e){
        console.warn('canonical saveReminders failed', e);
      }
    };
  })();
})();
</script>


<script>
(function(){
  'use strict';
  function byId(id){ return document.getElementById(id); }
  function esc(s){ return String(s||'').replace(/[&<>\"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;','\'':'&#39;'}[c]); }); }
  var activeLoopTag = null;

  function getActiveLoopTag(){ return activeLoopTag||''; }
  function setActiveLoopTag(tag){
    activeLoopTag = (tag||'').trim();
    try{ localStorage.setItem('loopTag', activeLoopTag); }catch(_){}
    renderTagButtons();
    try{ if (typeof window.restartLoop==='function') window.restartLoop(); else if (typeof window.startLoop==='function'){ window.stopLoop&&window.stopLoop(); window.startLoop(); } }catch(_){}
    try{ (window.toast||console.log)('Looping: ' + (activeLoopTag?('#'+activeLoopTag):'All')); }catch(_){}
  }

  function getAllTags(){
    var list = Array.isArray(window.reminders)? window.reminders : [];
    var st = new Set();
    for (var i=0;i<list.length;i++){
      var tags = Array.isArray(list[i] && list[i].tags) ? list[i].tags : [];
      for (var j=0;j<tags.length;j++){
        var t = String(tags[j]||'').trim(); if (t) st.add(t);
      }
    }
    return Array.from(st).sort(function(a,b){ return a.localeCompare(b); });
  }

  function renderTagButtons(){
    var bar = byId('tagLoopBar'); if (!bar) return;
    var tags = getAllTags();
    var cur = (getActiveLoopTag()||'').toLowerCase();
    var html = '';
    html += '<button class="tagbtn ' + (cur===''?'active':'') + '" data-tag="">All</button>';
    for (var i=0;i<tags.length;i++){
      var t = tags[i];
      html += '<button class="tagbtn ' + (cur===String(t).toLowerCase()?'active':'') + '" data-tag="'+esc(t)+'">#'+esc(t)+'</button>';
    }

      btns[k].addEventListener('click', function(ev){
        var tag = this.getAttribute('data-tag') || '';
        setActiveLoopTag(tag);
      });
    }
  }

  function getLoopList(){
    var list = Array.isArray(window.reminders)? window.reminders : [];
    var tag = getActiveLoopTag();
    if (!tag) return list;
    var tagLower = tag.toLowerCase();
    return list.filter(function(r){
      var tags = Array.isArray(r && r.tags) ? r.tags : [];
      for (var i=0;i<tags.length;i++){
        if (String(tags[i]||'').toLowerCase() === tagLower) return true;
      }
      return false;
    });
  }

  // Patch startLoop to use getLoopList()
  (function(){
    var prevStart = window.startLoop;
    var prevStop  = window.stopLoop;
    window.startLoop = function(){
      try{ if (window.loopTimer) clearInterval(window.loopTimer); }catch(_){}
      function nextIndex(len){
        try{
          var mode = (window.loopMode||'rand').toLowerCase();
          if (mode === 'rand') return Math.floor(Math.random()*len);
          window.loopIdx = (window.loopIdx||0);
          window.loopIdx = (window.loopIdx+1) % len;
          return window.loopIdx;
        }catch(_){ return Math.floor(Math.random()*len); }
      }
      function tick(){
        try{
          var list = getLoopList();
          if (!list.length){ window.setLoopLabel && window.setLoopLabel(''); return; }
          var i = nextIndex(list.length);
          var txt = String(list[i] && list[i].text || '').trim();
          window.setLoopLabel && window.setLoopLabel(txt);
        }catch(e){ try{ console.error('loop tick error', e); }catch(_){ } }
      }
      try{
        var sp = parseInt(window.loopSpeed||2000,10); if (isNaN(sp) || sp<500) sp = 2000;
        window.loopTimer = setInterval(tick, sp);
        tick();
      }catch(_){}
    };
    window.stopLoop = function(){ try{ if (window.loopTimer) clearInterval(window.loopTimer); window.loopTimer=null; }catch(_){ } };
    window.restartLoop = function(){ if (window.loopTimer) window.startLoop(); };
  })();

  // Create the bar near loop controls on load
  document.addEventListener('DOMContentLoaded', function(){
    try{
      if (!byId('tagLoopBar')){
        var speed = byId('loopSpeed');
        if (speed && speed.parentNode){
          var bar = document.createElement('div'); bar.id='tagLoopBar'; bar.className='tag-loop-bar';
          speed.parentNode.insertBefore(bar, speed.nextSibling);
        }
      }
      // load saved preference
      try{ var saved = localStorage.getItem('loopTag') || ''; if (saved) activeLoopTag = saved; }catch(_){}
      renderTagButtons();
    }catch(_){}
  });

  // Also re-render the bar whenever lists are re-rendered
  (function(){
    var prevRender = window.renderLists;
    window.renderLists = function(){
      try{ if (typeof prevRender==='function') prevRender(); }catch(_){}
      try{ renderTagButtons(); }catch(_){}
    };
  })();
})();
</script>

        function addFromInput(){

          if (!toks.length) return;
          toks.forEach(function(t){
            if (!curTags.some(function(x){ return x.toLowerCase()===t.toLowerCase(); })){

            }
          });

        }

        input.addEventListener('keydown', function(ev){

          }
        });

        // Also provide a delegated fallback in case dynamic chips miss direct handlers
        var delegatedRemove = function(ev){
          var x = ev.target && ev.target.closest ? ev.target.closest('.chip-x') : null;
          if (!x) return;
          ev.preventDefault(); ev.stopPropagation();
          var pill = x.closest('.tag-pill');

<script id="minus-delegate">
(function(){
  try{
    document.addEventListener('click', function(ev){
      var el = ev.target && ev.target.closest ? ev.target.closest('.minus') : null;
      if (!el) return;
      var row = el.closest && el.closest('.item');
      var id = row && row.getAttribute('data-id');
      if (!id) return;
      try{
        // Direct delete: move from reminders to deleted
        var rem = Array.isArray(window.reminders) ? window.reminders : (window.reminders = []);
        var bin = Array.isArray(window.deleted) ? window.deleted : (window.deleted = []);
        var idx = rem.findIndex(function(r){ return String(r && r.id) === String(id); });
        if (idx > -1){
          bin.unshift(rem[idx]);
          rem.splice(idx,1);
          // Persist & refresh
          try{ if (typeof window.saveReminders==='function') window.saveReminders(); }catch(_){}
          try{ if (typeof window.renderLists==='function') window.renderLists(); }catch(_){}
          // Toast
          try{
            if (typeof window.toast==='function') window.toast('Reminder deleted');
            else if (typeof window.setStatus==='function'){ setStatus('Reminder deleted'); setTimeout(function(){ setStatus(''); }, 1400); }
          }catch(_){}
        }
      }catch(e){ try{ console.warn('minus delegate error', e); }catch(_){ } }
      ev.preventDefault(); ev.stopPropagation();
    }, true);
  }catch(_){}
})();
</script>
<script id="bind-newText-enter">
(function(){
  try{
    var ta = document.getElementById('newText');
    if (!ta || ta.__boundEnter) return;
    ta.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        var v = String(ta.value||'').trim();
        if (!v) return;
        if (typeof window.handleReminder==='function'){
          window.handleReminder('add', v);
        } else {
          // Fallback direct add
          window.reminders = Array.isArray(window.reminders) ? window.reminders : [];
          window.reminders.unshift({ id: Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7), text: v, tags: []});
          if (typeof window.saveReminders==='function') try{ window.saveReminders(); }catch(_){}
          if (typeof window.renderLists==='function') try{ window.renderLists(); }catch(_){}
          if (typeof window.toast==='function') try{ window.toast('Reminder added'); }catch(_){}
        }
        ta.value='';
      } else if (e.key === 'Escape'){
        ta.value='';
      }
    }, false);
    ta.__boundEnter = true;
  }catch(_){}
})();
</script>
<script id="force-newText-visible-js">
(function(){
  'use strict';
  function showAddBar(){
    try{
      var ta = document.getElementById('newText');
      if (!ta) return;
      // If any ancestor hides it, clear inline style and try to show
      try {
        // Remove inline display:none on the node
        if (ta.style && ta.style.display === 'none') ta.style.display = 'block';
        // If it's still not visible, attempt to clear visibility/opacity
        ta.style.visibility = 'visible';
        ta.style.opacity = '1';
        // If parent ".row" exists and is hidden, show it
        var row = ta.closest && ta.closest('.row');
        if (row && getComputedStyle(row).display === 'none') row.style.display = 'block';
      } catch(_) {}
      try { ta.scrollIntoView({behavior:'smooth', block:'center'}); } catch(_) {}
      try { ta.focus(); } catch(_) {}
    } catch(_){}
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', showAddBar);
  } else { showAddBar(); }
  window.addEventListener('resize', function(){ showAddBar(); });
})();
</script>

<div id="addOverlay" class="add-overlay" aria-hidden="true">

    <textarea id="addOverlayText" placeholder="Type a new reminder… (Enter = add, Shift+Enter = newline, Esc = close)"></textarea>
    <button id="addOverlayAddBtn" title="Add">Add</button>

  </div>

<script id="add-overlay-js">
(function(){
  'use strict';
  function ensureArrays(){
    if (!Array.isArray(window.reminders)) window.reminders = [];
    if (!Array.isArray(window.deleted)) window.deleted = [];
  }
  function openAddOverlay(){
    try{
      ensureArrays();
      var ov = document.getElementById('addOverlay');
      var ta = document.getElementById('addOverlayText');
      if (!ov || !ta) return;
      ov.classList.add('open'); ov.setAttribute('aria-hidden','false');
      try{ ta.focus(); }catch(_){}
    }catch(_){}
  }
  function closeAddOverlay(){
    var ov = document.getElementById('addOverlay');
    var ta = document.getElementById('addOverlayText');
    if (ov){ ov.classList.remove('open'); ov.setAttribute('aria-hidden','true'); }
    if (ta){ ta.value=''; }
  }
  function doAdd(text){
    var v = String(text||'').trim();
    if (!v) return;
    ensureArrays();
    window.reminders.unshift({ id: Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7), text: v, tags: []});
    try{ if (typeof window.saveReminders==='function') window.saveReminders(); }catch(_){}
    try{ if (typeof window.renderLists==='function') window.renderLists(); }catch(_){}
    try{
      if (typeof window.toast==='function') window.toast('Reminder added');
      else if (typeof window.setStatus==='function'){ setStatus('Reminder added'); setTimeout(function(){ setStatus(''); }, 1200); }
    }catch(_){}
  }
  window.openAddOverlay = openAddOverlay; // expose for onclick
  // Bind overlay buttons & keys on DOM ready
  function bindOverlay(){
    var ov = document.getElementById('addOverlay');
    var ta = document.getElementById('addOverlayText');
    var addBtn = document.getElementById('addOverlayAddBtn');
    var closeBtn = document.getElementById('addOverlayCloseBtn');
    if (addBtn && !addBtn.__bound){
      addBtn.addEventListener('click', function(){ doAdd(ta && ta.value); closeAddOverlay(); });
      addBtn.__bound = true;
    }
    if (closeBtn && !closeBtn.__bound){
      closeBtn.addEventListener('click', function(){ closeAddOverlay(); });
      closeBtn.__bound = true;
    }
    if (ta && !ta.__bound){
      ta.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && !e.shiftKey){
          e.preventDefault(); doAdd(ta.value); closeAddOverlay();
        } else if (e.key === 'Escape'){
          e.preventDefault(); closeAddOverlay();
        }
      });
      ta.__bound = true;
    }
    // Clicking outside the bar closes the overlay
    if (ov && !ov.__bgBound){
      ov.addEventListener('click', function(e){
        if (!e.target.closest('.bar')) closeAddOverlay();
      });
      ov.__bgBound = true;
    }
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', bindOverlay);
  } else { bindOverlay(); }
})();
</script>
